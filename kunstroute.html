	<script>
		var map;
document.addEventListener("DOMContentLoaded", function() 
{
	class artist
	{
		constructor(naam, kunstenaar, mail, web, phone, mobile, txt)
		{
			this.naam = naam;
			this.kunstenaar = kunstenaar;
			this.mail = mail;
			this.web = web;
			this.phone = phone;
			this.mobile = mobile;
			this.txt = txt;
		}
	}

	var allArtists = [];

	map = L.map('map').setView([52.73283113165456, 6.5308724214854355], 12);
	
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	const jan = new artist('Jan Abercrombie', null, 'abercrombie@home.nl', null, null, '0629577701', 'Ik schilder meestal met olieverf. Eerder ook met acrylverf. Kleine tot grote schilderijen. Meestal figuratief. Ik vind het leuk om buiten te schilderen of landschappen uit mijn herinnering. Ook portretten, model en dieren, bloemen en tuin.<br /><br />Ik zoek de onderwerpen dicht bij huis');
	const janM = new artist('Jan Meijer', null, 'studio@meibrink.nl', 'https://meibrink.nl/', '0528232011', '0612107234', 'Naast grafisch ontwerp houd ik me bezig met fotografie. Zowel in opdracht als in eigen beheer.<br /><br />De kunst van het weglaten en zo te fotograferen dat het me overkomt.<br /><br />Vrij vertaald naar Martin Bril');
	const paula = new artist('Paula Bansema', null, 'paulabansema@hotmail.com', 'https://www.focusmetpassie.com/', null, '06-42238666', 'Ik maak mijn foto\’s zo, wat ik zie door de camera laat ik de mensen zien op het gebied van natuur, dieren, bloemen e.d.');
	const leendert = new artist('Leendert Jassies', null, 'l.jassies@kpnplanet.nl', null, null, '0528351659', 'Ik maak mijn foto\’s zo, wat ik zie door de camera laat ik de mensen zien op het gebied van natuur, dieren, bloemen e.d.');
	const jantina = new artist('Jantina Zwiep', null, 'j.zwiep@kpnmail.nl', null, '0528-351659', null, null);	
	addMarkerToMap(map, 52.72709577, 6.4788372, 'Tamboerpassage, Hoogeveen', 'camera', '0000ff', [ jan, janM, paula, leendert, jantina ]);

	const gerard = new artist('Atelier &quot;Glas in Kleur&quot;', 'Gerard Weisbeek', 'gcweisbeek@gmail.com', null, '0528202988', '0615360880', 'Ik maak raamhangers, staande objecten of op stander, schalen etc. van gekleurd glas.<br /><br />Ook in opdracht. In mijn atelier geef ik workshops voor max. 5 personen. Deelnemers kunnen zelf hun keuze bepalen voor hetgeen ze willen maken.<br /><br />Glas-in-lood en tiffany worden in 3 dagdelen gegeven, glasfusion is 1 hele dag.<br /><br />Kunstmarkten waar ik sta o.a. in Diever, Vledder, Wezup, Sellingen, Hoogeveen.');
	addMarkerToMap(map, 52.68219533524088, 6.537326068376194, 'Zuideropgaande 115, Hollandscheveld', 'glass-martini', 'ff0000', [ gerard ]);

	const reginald = new artist('Reginald Ko&eacute;', null, 'info@studio-redzji.nl', 'https://www.studioredzji.com/', '0528-361144', '06-19626398', 'Reginald werd in 1942 in Amsterdam geboren en woont inmiddels ruim 30 jaar in Drenthe.');	
	addMarkerToMap(map, 52.674886757317154, 6.52197062431806, 'Riegshoogtendijk 208, Hollandscheveld', 'palette', 'ffff00', [ reginald ]);

	const rolinda = new artist('Rolinda Otten', null, 'Romari1@live.nl', null, null, '06-30354364', 'Ik houd van dieren, mensen en realistische kunst. Heel mijn passie en mijn ziel leg ik dan ook in mijn schilderijen. Ik geef workshops en geef wekelijkse lessen werk in opdracht.');	
	addMarkerToMap(map, 52.682488915907456, 6.5904155550066745, 'Perebomenweg 37, Elim', 'palette', 'ffff00', [ rolinda]);
	
	const stoffer = new artist('Atelier het Vossenhol', 'Stoffer Vos', 's.vos@ziggo.nl', null, '0528-351950', null, 'Mijn werk is meestal realistisch en zeer divers. Zowel portret, dieren, vogels, natuur, bloemen en stillevens zijn door mij geliefde onderwerpen. Ik probeer ze zo natuurlijk mogelijk neer te zetten, waarbij ik experimenteer met verschillende technieken. Ik schilder zowel met olie, acryl als waterverf, al naar gelang het onderwerp. Wat ik prachtig vind is om de dingen zo goed mogelijk te observeren om ze daarna vast te leggen.');
	addMarkerToMap(map, 52.69773894004033, 6.610127768027912, 'Johannes Poststraat 45, Nieuwlande', 'palette', 'ffff00', [stoffer ]);
	
	const marco = new artist('Marco Corba', null, 'mc88@ziggo.nl', null, '0528-274056', null, 'Een hobbyist die gaat schilderen zonder les, is dat wel verantwoord? De doeken klagen in ieder geval niet! (sommige mensen daarentegen wel). Wat u kunt verwachten bij een bezoek: schilderijen gemaakt van acryl verf in realistische weergave. Landschappen, dieren, oude gebouwen en fantasie werkstukken. Grootte en kleur wisselen per schilderij, net als onderwerp dus er is voor ieder wat wils.');
	addMarkerToMap(map, 52.711125520474035,6.458373268500356, 'Damhert 29, Hoogeveen', 'palette', 'ffff00', [ marco]);
	
	const frederique = new artist('Atelier de Eiken', 'Frédérique Waakop Reijers', 'atelier.de.eiken@gmail.com', 'https://www.atelier-de-eiken.com/', null, '0625545488', 'Als autodidact laat ik mij inspireren door de natuur en muziek. Graag laat ik mij uitdagen door een stijl te proberen, die niet direct de mijne is. Dit lukt niet altijd, maar het proberen geeft veel voldoening.');	
	addMarkerToMap(map, 52.71194759623809, 6.573952825705185, 'Meerboomweg-Zuid 13, Hollandscheveld', 'palette', 'ffff00', [frederique ]);
	
	const annekeV = new artist('Anneke van Venrooij', null, 'info@annekevanvenrooy.nl', null, '0528-276455', null, 'Ik schilder heel graag tafereeltjes, portretten van kind tot volwassene. Ik probeer het zoveel zeggend mogelijk in beeld te brengen. Niet alleen schilder ik de mens graag, want het onderwerp kan van alles zijn van portret, landschap, stilleven tot stadsgezicht. Door middel van kleur en licht geef ik het onderwerp de stemming waar het om vraagt. Die elementen zijn voor mij enorm belangrijk omdat die de sfeer van mijn schilderij bepalen.');	
	addMarkerToMap(map, 52.713300436495096, 6.466657068764897, 'Beukencamp 14, Hoogeveen', 'palette', 'ffff00', [ annekeV]);
	
	const niesje = new artist('Atelier Cocon', 'Niesje Metselaar', 'harnies@home.nl', null, '0528342202', '0615002416', 'Als een rode draad is schilderen verweven met mijn leven. Op de dag dat ik 12 werd kreeg ik 12 tubetjes plakkaatverf van mijn tante. En nu jaren later ben ik bijna elke dag in mijn atelier. Vooral de natuur is ontzettend mooi om te schilderen. En dat laat ik de mensen graag zien, niet met woorden maar met verf en penseel .');	
	addMarkerToMap(map, 52.71526220537709, 6.530066668500586, 'Krakeelsedijk 26, Hollandscheveld', 'palette', 'ffff00', [ niesje]);
	
	const anne = new artist('Anne Kuipers', null, 'annekuipers2013@gmail.com', null, '0528275358', '0633833276', 'Anne Kuipers, geboren in Borger en vanaf 1982 woonachtig in Hoogeveen, is een gepassioneerd fotograaf die zich al een leven lang laat inspireren door de natuur. Zijn werk laat zich het best beschrijven als landschapsfotografie met de bijbehorende en flora en fauna. ');	
	addMarkerToMap(map, 52.716120704861964, 6.503114655008706, 'De Plevier 64, Hoogeveen', 'camera', '0000ff', [anne ]);
	
	const geert = new artist('Atelier 13', 'Geert Oldenbeuving', 'info@geertoldenbeuving.nl', 'https://geertoldenbeuving.nl', '0528-263748', null, 'De kunstwerken van Geert vinden z’n weg in binnen en buitenland o.a. UK/US/Vietnam/Portugal/Spain/Griekenland/Armeni&euml;');
	addMarkerToMap(map, 52.71650415413871, 6.449258655070722, 'De Botter 13, Hoogeveen', 'palette', 'ffff00', [ geert]);
	
	const ada = new artist('Ada Veldman', null, 'adaaveldman@gmail.com', null, null, '0620168891', 'Het is de sfeer van het moment waar ik van geniet wanneer ik thuis de foto\'s bekijk. Natuur is doorlopend in beweging en in verandering en brengt ieder seizoen een andere sfeer. ................. altijd verrassend.................... Op de expositie Kunstroute dagen Hoogeveen zijn mijn foto\'s te bekijken net als voorgaande jaren op locatie Jannes v.d. Sleedenhuis NNCZ Wolfsbos');
	addMarkerToMap(map, 52.718956889941595, 6.495351183844878, 'Valkenlaan 5, Hoogeveen', 'camera', '0000ff', [ada ]);
	
	const ineke = new artist('Ineke Post', null, 'fg.post-drent@home.nl', null, null, '0617003974', 'Mijn naam is Ineke Post en ik maak schilderijen en gedichten. Ook vind ik het leuk om op eieren te tekenen. Meestal schilder ik met acrylverf en daar teken ik later in. Ik houd van kleur en dat is in mijn schilderijen terug te zien. Onderwerpen ontleen ik aan beelden of teksten die me aanspreken. Echter heel vaak ontstaat er iets gaandeweg het proces en gebruik ik mijn fantasie.');
	addMarkerToMap(map, 52.719849793473195, 6.487513468500899, 'Schoklandstraat 13, Hoogeveen', 'palette', 'ffff00', [ ineke]);
	
	const roel = new artist('Roel Kuper', null, 'roelkuper@ziggo.nl', null, null, '0615124456', 'Ik maak van steengoed op mijn pottenbakkersschijf gebruiksvoorwerpen als: vogelbadjes, mezen- en luizenbollen voor in de tuin en geen handvormen. De glazuren die ik gebruik maak ik zelf. De keramiek bak ik op 1230ºC waardoor vazen, schalen en olielampjes die ik ook maak gegarandeerd waterdicht zijn.');	
	addMarkerToMap(map, 52.7201679925014, 6.511092124320773, 'Roerdomplaan 156, Hoogeveen', 'flask', '00ff00', [roel ]);
	
	const patty = new artist('Atelier Patty Art', 'Patty Aalbersberg', 'pattykunst@gmail.com', 'https://www.patty-art.nl/', null, '0642875202', 'Kenmerkend voor mijn werk is het samenspel tussen licht en schaduw gecombineerd met veel structuur en minimaal kleur gebruik. Door het aanbrengen en deels wegschrapen van verf en structuren cre&euml;er ik een verweerd onderlaag waarop ik mijn figuratieve onderwerp ga uitwerken. Er ontstaat een intieme sfeer doordat de prachtige lijnen en vormen van een menselijke lichaam of een dier, ritmisch opkomen en weer verdwijnen in de abstracte achtergrond.');	
	addMarkerToMap(map, 52.72035549,6.4556392, 'Mortonhof 28, Hoogeveen', 'palette', 'ffff00', [ patty]);
	
	const elly = new artist('Elly Borgonjen', null, 'emjb52@hotmail.com', 'https://www.schildersgroepindigo.nl/', '0528234615', '0648925488', 'Sinds 12 jaar schilder ik met veel plezier bij de Indigo groep. In die jaren heb ik veel geleerd. Verschillende technieken uitgeprobeerd en acryl is wat mij het beste ligt. De kunstroute is voor mij het moment om naar toe te leven en waar ik mijn nieuwe schilderijen kan laten zien in de Bibliotheek te Hoogeveen.');	
	addMarkerToMap(map, 52.72035549,6.4556392, 'Willemskade 27, Hoogeveen', 'palette', 'ffff00', [ elly]);
	
	const annekeS = new artist('Atelier Geluksklaver', 'Anneke Schepers', 'geluksklaver@live.nl', null, '0524222852', '0653425611', 'Mijn discipline is schilderen. M’n werk is voornamelijk realistisch, ik schilder met acryl en olieverf op diverse ondergronden. Voor mij is het een ontspannende inspanning, waar ik me helemaal in kan verliezen. Het geeft mij een ontzettend geluksgevoel als mensen blij worden van mijn werk! Mijn inspiratiebron is vooral mijn creatieve brein.');	
	addMarkerToMap(map, 52.72166046688253, 6.617198483380794, 'Coevorderstraatweg 31 A4, Geesbrug', 'palette', 'ffff00', [ annekeS ]);
	
	const maaike = new artist('Atelier Thuijltjes & JeKunstHet', 'Maaike Thuijl', 'maaike@atelierthuijltjes.com', null, '06-24593759', 'Net als mijn karakter, maak ik kleurrijk werk met Acrylverf. Schilderen doe ik met mijn gevoel, soms is dat wel en soms niet figuratief. Naast mijn kunst kunt u bij mij ook alles zien van mijn andere activiteiten in mijn atelier zoals; kinderfeestjes, workshops en schilder coaching. Natuurlijk is er een activiteit te doen voor de kinderen, maar volwassenen mogen daarbij ook aansluiten.');	
	addMarkerToMap(map, 52.72445346079357, 6.517594441517285, 'Algol 19, Hoogeveen', 'palette', 'ffff00', [ maaike ]);

	const roelof = new artist('Roelof Koobs', null, 'roelkoobs@hetnet.nl', null, null, '06-10294413', 'Ik schilder met olieverf op linnen in een figuratief-impressionistische manier landschap, stads en dorpsgezichten en bloemstilleven. Hoewel autodidact probeer ik mijn onderwerpen zo doeltreffend af te beelden. Zo blijft het schilderen altijd een uitdaging.');	
	addMarkerToMap(map, 52.728883674085175,6.471427151305265, 'Ferdinand Bolstraat 2B, Hoogeveen', 'palette', 'ffff00', [roelof ]);
	
	const erika = new artist('Erika Schonewille', null, 'eschonewille@12move.nl', 'https://www.schildersgroepindigo.nl/', null, '06-34435539', 'Na zovele jaren blijf ik nog steeds het schilderen leuk vinden. Je ontwikkelt je steeds meer. Verschillende technieken probeer je uit waardoor je ook divers wordt met onderwerpen. Mengen met kleuren doe ik graag. Behalve met acryl schilder ik ook met olieverf/cobra. Onze schildersgroep bestaat uit 4 dames en we hebben les van Anneke van Venrooy. In het verleden heb ik ook andere cursussen gevolgd. Op Instagram ben ik te zien o.a. erika_painting. U kunt mijn schilderijen tijdens de Kunstroute bewonderen in de centrale Bibliotheek.');	
	const thea = new artist('Thea de Rooij', null, 'thea@de-rooij.com', 'https://www.schildersgroepindigo.nl/', '0528265673', '0649416506', 'Schilderen is voor mij ontspanning en creatief bezig zijn.');
	addMarkerToMap(map, 52.729266164712755, 6.48012164151753, 'Willemskade 27, Hoogeveen', 'palette', 'ffff00', [ erika, thea]);

	const paulaK = new artist('Paula Krol', null, 'paulakrol@home.nl', null,null, '06-50570638', 'Samen met Tammy en Janny fotografeer ik al jaren. Onderwerpen verzinnen en kijken wat een ieder er weer van maakt. Door de Kunstroute komt de inspiratie weer op gang, waardoor we regelmatig op pad gaan met de camera.');
	const janny = new artist('Janny Timmerman', null, 'veens13@ziggo.nl', null,null, '06-37314834', 'Na verschillende cursussen te hebben gevolgd, fotografeer ik al een aantal jaren met heel veel plezier. Een specifieke stijl van fotograferen heb ik niet, mijn foto’s zijn gevarieerd, dit kan van zwart/wit, abstract, macro, natuur foto’s zijn. Het is steeds weer een uitdaging om deze stijlen naar beeld te vertalen. Ook gaat mijn voorkeur naar meer subtiele inhoud dan voor spektakel. Een foto met verschillende elementen zoals lichtval, creativiteit en emotie is voor mij belangrijk. ');	
	const tammy = new artist('Tammy Westra', null, 'tammywestra@home.nl',null, null, '06-25530513', 'Samen met fotogroep “Splinterproject” het land in op “fotojacht”. Mijn werk is heel divers, stadsfotografie, landschapsfotografie, portretfotografie enz. Na de fotosessies worden de foto’s altijd besproken in de groep. Zo probeer ik altijd anders te kijken om een bijzonder plaatje te schieten. Compositie, lichtval, het onderwerp en de sfeer zijn daarbij belangrijk elementen. Deze elementen zijn ook belangrijk bij het maken van een schilderij. Samen schilder ik met schildersgroep “Indigo”! Vaak probeer ik mijn zelfgemaakte foto’s te gebruiken bij het schilderen. Realistische werken, soms met samengevoegde beelden, abstract lijkende werken geschilderd met acrylverf. Ik vind het zeker de moeite waard om mijn werk aan het publiek te laten zien. U kunt mij deze keer op twee locaties treffen. ');	
	addMarkerToMap(map, 52.73137690981779, 6.477812597214671, 'Brinkstraat 5, Hoogeveen', 'camera', '0000ff', [ paulaK, janny, tammy]);

	const erik = new artist('Erik Stokker', null, 'erikstokker@artbyest.com', 'https://artybest.com', null, '06-10281722', 'Erik Stokker maakt ragfijne pentekeningen met de rOtring pen. Deze van origine grafische pen is diepzwart en geschikt voor scherpe lijnen en details. Dat is terug te zien in de tekeningen! Met veel geduld zijn uitgekiende vormen, ritmes en veel details op papier gezet. Soms realistisch, soms abstract en vaak werelden van stippen en lijnen. De vormen nodigen je uit om in het werk te kruipen en Erik zijn wereld mee te beleven.');	
	const maya = new artist('Maya Mastwijk', null, 'maya@mayamastwijk.nl', 'https://www.mayamastwijk.nl/', null, '06-24423591', 'Mijn abstracte sculpturen zijn uitgekiend in balans. Van zorgvuldig bij elkaar gezochte afgedankte spullen, die ik uit elkaar haal, maak ik ruimtelijke werken die de grens tussen staan en vallen zo dicht mogelijk benaderen. Terwijl de compositie schijnbaar logisch en voor de hand liggend is, is het vaak verrassend hoe de sculpturen in balans kunnen blijven. De werken bestaan namelijk alleen uit het materiaal. Dit wordt niet vastgezet met lijm, schroeven of dergelijke. De balans die zo ontstaat, is essentieel.');
	const theun = new artist('Theun Krikke', null, 'info@thekart.nl', 'https://www.thekart.nl/', null, '06-13846728', 'Een lichtval, een emotie, een blik, een mens, de natuur - het overvalt me, inspireert me, en ik wil het op doek zetten. Naast schilderen heb ik nog een tweede hobby: fotografie. Op basis van eigen foto’s schilder ik mijn voorstellingen. Ondanks dat veel onderwerpen mij aanspreken, boeit het schilderen van mensen mij het meest. Voornamelijk schilder ik met acrylverf en olieverf op doek en paneel. Hoewel ik autodidact ben, heb ik hier en daar mijn licht opgestoken bij collega-schilders. Gedurende 4 jaar heb ik lessen gevolgd bij Keimpe van der Kooi, kunstenaar en docent aan de klassieke academie te Groningen.');	
	addMarkerToMap(map, 52.75566381097287, 6.4627652089788805, 'Hoogeveenseweg 22, Fluitenberg', 'palette', 'ffff00', [erik, maya, theun ]);

	const marijke = new artist('Atelier Marijke Kloosterman', 'Marijke Kloosterman', 'marijke.kloosterman@hccnet.nl', null, '0528-331388', null, 'De energie van de elementen, culturen en hun overlevering zijn mijn inspiratie. ');	
	const sandra = new artist('Sandra Kroonstuiver-Kloosterman', null, 'mensenmensdagbesteding@gmail.com', null, '0528-331388', '06-51719786', 'Sandra Kroonstuiver-Kloosterman is een kunstenaar en creatief activiteitenbegeleider bij Mens&Mens. In haar eigen kleinschalige dagbesteding wil ze graag samen met de deelnemers, mensen met een (voornamelijk) lichamelijke beperking, mooie werkstukken maken van verschillende materialen. Haar voorliefde voor de natuur en de organische vormen zie je terug in haar werk, en ook in dat van de deelnemers. Het proces van creatie is er eentje die Sandra leuk vindt om te doen en ook leuk vindt om te begeleiden.');	
	addMarkerToMap(map, 52.75943946991825, 6.536355554887415, 'Kerkweg 30A, Tiendeveen', 'palette', 'ffff00', [ marijke, sandra ]);	
	
	allArtists.sort(
		(a,b) => 
		(a.naam > b.naam) 
		? 1 
		: (
			(b.naam > a.naam) 
			? -1 
			: 0)
	);
	
	placesListDiv = document.getElementById('placesList');
	if (placesListDiv)
	{
		allArtists.forEach(artist => 
		{
			placesListDiv.innerHTML += `<li><a href="javascript:showPopup(map, ${artist.latitude}, ${artist.longitude});">${artist.naam}: ${artist.address}</a></li>`;
		});
	}
	
	var customOptions =
	{
		'maxWidth': '400',
		'width': '200',
		'className' : 'popupCustom'
	};
	
	function addMarkerToMap (map, latitude, longitude, address, icon, icon_bgcolor, artists)
	{
		//https://www.google.com/maps/dir/?api=1&destination=52.75943946991825, 6.536355554887415&travelmode=driving
		//https://maps.google.com/maps?q=${latitude},${longitude}&z=13
		var customPopup = `<i class="fa-solid fa-location-dot"></i>&nbsp;<a href="https://www.google.com/maps/dir/?api=1&destination=${latitude},${longitude}&travelmode=driving" target="_blank">${address}</a><br /><br />`;
		if (!icon)
		{
			icon = 'question';
			icon_bgcolor = 'ffff00';
		}

		var customPopup = `<i class="fa-solid fa-location-dot"></i>&nbsp;<a href="https://www.google.com/maps/dir/?api=1&destination=${latitude},${longitude}&travelmode=driving" target="_blank">${address}</a>
		<br /><br />`;

		if (artists.length > 1)
		{
			customPopup += `<ul class="nav nav-pills">`;
			artists.forEach((artist, index) => 
			{
				customPopup += `<li class="nav-item" role="presentation">
					<a class="nav-link ${index === 0 ? 'active' : ''}" id="simple-tab-${index}" data-bs-toggle="tab" href="#simple-tabpanel-${index}" role="tab" aria-controls="simple-tabpanel-${index}" aria-selected="${index === 0}">${artist.naam}</a>
				</li>`;
			});
			customPopup += "</ul>";
		}

		if (artists.length > 1)
		{
			customPopup += `<div class="tab-content pt-5" id="tab-content">`;
			artists.forEach((artist, index) => 
			{
				artist.longitude = longitude;
				artist.latitude = latitude;
				artist.address = address;
				
				allArtists.push(artist);
				
				customPopup += `<div class="tab-pane ${index === 0 ? 'active' : ''}" id="simple-tabpanel-${index}" role="tabpanel" aria-labelledby="simple-tab-${index}">
					`;
				
				if (artist.naam) customPopup += `<b>${artist.naam}</b>`;
				if (artist.kunstenaar) customPopup += `<br /><i>${artist.kunstenaar}</i>`;
				if (artist.mail) customPopup += `&nbsp;<a href='mailto:${artist.mail}'><i class='fa-regular fa-envelope'></i></a>`;
				if (artist.web) customPopup += `&nbsp;<a href='${artist.web}' target='_blank'><i class='fa-solid fa-globe'></i></a>`;
				if (artist.phone) customPopup += `&nbsp;<a href='tel:${artist.phone}'><i class='fa-solid fa-phone'></i></a>`;
				if (artist.mobile) customPopup += `&nbsp;<a href='tel:${artist.mobile}'><i class='fa-solid fa-mobile-retro'></i></a>`;
				customPopup += `<br />`;
				if (artist.txt) customPopup += `${artist.txt}`;

				customPopup += `</div>`;
			});
			customPopup += `</div>`;
		}
		else
		{
			var artist = artists[0];

			artist.longitude = longitude;
			artist.latitude = latitude;
			artist.address = address;
			
			allArtists.push(artist);
	
			if (artist.naam) customPopup += `<b>${artist.naam}</b>`;
			if (artist.kunstenaar) customPopup += `<br /><i>${artist.kunstenaar}</i>`;
			if (artist.mail) customPopup += `&nbsp;<a href='mailto:${artist.mail}'><i class='fa-regular fa-envelope'></i></a>`;
			if (artist.web) customPopup += `&nbsp;<a href='${artist.web}' target='_blank'><i class='fa-solid fa-globe'></i></a>`;
			if (artist.phone) customPopup += `&nbsp;<a href='tel:${artist.phone}'><i class='fa-solid fa-phone'></i></a>`;
			if (artist.mobile) customPopup += `&nbsp;<a href='tel:${artist.mobile}'><i class='fa-solid fa-mobile-retro'></i></a>`;
			customPopup += `<br />`;
			if (artist.txt) customPopup += `${artist.txt}`;
		}
		
		var icon_bgcolor;
		switch (icon)
		{
			case 'palette':
				icon_bgcolor = 'red';
				break;

			case 'camera':
				icon_bgcolor = 'blue';
				break;

			case 'flask':
				icon_bgcolor = 'orange';
			break;
			
			case 'glass-martini':
				icon_bgcolor = 'green';
			break;
		}

	var colors = ['red', 'blue', 'green', 'purple', 'orange', 'darkred', 'lightred', 'beige', 'darkblue', 'darkgreen', 
			'cadetblue', 'darkpurple', 'white', 'pink', 'lightblue', 'lightgreen', 'gray', 'black', 'lightgray'];

			L.marker([latitude, longitude], {
				icon: L.AwesomeMarkers.icon({icon: icon, prefix: 'fa', markerColor: icon_bgcolor}) })
					.bindPopup(customPopup, customOptions)
					.addTo(map);
		}
	});

function showPopup(map, lat, lng)
{
	map.eachLayer(function (layer) { 
		if (layer._latlng && layer._latlng.lat === lat && layer._latlng.lng === lng) 
		{
			layer.openPopup();
		}
	});
}
</script>
